  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#06111d',
            panel: '#0b1725',
            panel2: '#0f2135',
            line: '#16314d',
            gold: '#d4af37',
            emerald: '#18b87a',
            ice: '#dbeafe'
          },
          boxShadow: {
            glow: '0 0 0 1px rgba(212,175,55,.15), 0 20px 60px rgba(0,0,0,.45)'
          },
          backgroundImage: {
            pitch: 'linear-gradient(180deg, rgba(10,29,44,.95), rgba(6,17,29,.95))'
          }
        }

  <style>
    html { scroll-behavior: smooth; }
    body {
      background:
        radial-gradient(circle at top, rgba(24,184,122,.12), transparent 28%),
        radial-gradient(circle at 80% 10%, rgba(212,175,55,.12), transparent 24%),
        linear-gradient(180deg, #02070d, #06111d 18%, #08131f 100%);
    }
    .glass {
      background: linear-gradient(180deg, rgba(15,33,53,.88), rgba(10,22,35,.84));
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,.08);
    }
    .hero-grid {
      background:
        radial-gradient(circle at 20% 20%, rgba(24,184,122,.2), transparent 30%),
        radial-gradient(circle at 80% 0%, rgba(212,175,55,.15), transparent 22%),
        linear-gradient(135deg, rgba(8,19,31,.95), rgba(10,34,54,.95));
    }
    .pitch {
      background-image:
        linear-gradient(90deg, rgba(255,255,255,.03) 0 1px, transparent 1px 100%),
        linear-gradient(0deg, rgba(255,255,255,.03) 0 1px, transparent 1px 100%),
        linear-gradient(180deg, #0a2b1e, #09341e 60%, #08261a);
      background-size: 12.5% 100%, 100% 12.5%, auto;
      position: relative;
      overflow: hidden;
    }
    .pitch::before {
      content: '';
      position: absolute; inset: 16px;
      border: 2px solid rgba(255,255,255,.14);
      border-radius: 18px;
      pointer-events: none;
    }
    .pitch::after {
      content: '';
      position: absolute; left: 50%; top: 0; bottom: 0;
      width: 2px; background: rgba(255,255,255,.14);
      transform: translateX(-50%);
    }
    .pitch-center-circle {
      position: absolute; width: 120px; height: 120px;
      border: 2px solid rgba(255,255,255,.14);
      border-radius: 999px; left: 50%; top: 50%; transform: translate(-50%, -50%);
    }
    .pitch-spot {
      position: absolute; width: 8px; height: 8px; border-radius: 999px;
      background: rgba(255,255,255,.18);
      left: 50%; top: 50%; transform: translate(-50%, -50%);
    }
    .kit {
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.12), 0 10px 20px rgba(0,0,0,.25);
    }
    .player-card, .team-card, .info-card, .fixture-card, .stadium-card {
      transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease, filter .25s ease;
    }
    .player-card:hover, .team-card:hover, .fixture-card:hover, .stadium-card:hover {
      transform: translateY(-4px);
      border-color: rgba(212,175,55,.45);
      box-shadow: 0 20px 50px rgba(0,0,0,.35);
    }
    .modal-backdrop {
      background: rgba(2,6,12,.78);
      backdrop-filter: blur(12px);
    }
    .scrollbar-thin::-webkit-scrollbar { height: 10px; width: 10px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(255,255,255,.14); border-radius: 999px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: rgba(255,255,255,.04); }
    .ring-gold { box-shadow: 0 0 0 1px rgba(212,175,55,.35), 0 0 0 6px rgba(212,175,55,.06); }
    .input-soft {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      outline: none;
    }
    .input-soft:focus {
      border-color: rgba(212,175,55,.55);
      box-shadow: 0 0 0 4px rgba(212,175,55,.10);
    }
  </style>
</head>

      return x - Math.floor(x);

      if (code === 'gb-eng' || code === 'gb-sct') {
        return `data:image/svg+xml;utf8,${encodeURIComponent(flagSvg(code === 'gb-eng' ? 'ENGLATERRA' : 'ESCÓCIA', code === 'gb-eng' ? '#dbeafe' : '#93c5fd', code === 'gb-eng' ? '#b91c1c' : '#1d4ed8'))}`;

      return `https://flagcdn.com/w320/${code}.png`;
    }

      const initials = name.split(' ').slice(0,2).map(v => v[0]).join('').toUpperCase();

      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
        <defs>
          <radialGradient id="bg" cx="30%" cy="20%" r="90%">
            <stop offset="0%" stop-color="${bg2}"/>
            <stop offset="100%" stop-color="${bg1}"/>
          </radialGradient>
        </defs>

        <circle cx="256" cy="196" r="86" fill="rgba(255,255,255,.16)"/>

    function kitImage(seed, variant) {
      const p = variant === 'home' ? choice(['#14532d','#1d4ed8','#7f1d1d','#111827','#ef4444'], seed) : choice(['#f8fafc','#dbeafe','#fef3c7','#fee2e2','#dcfce7'], seed + 77);

      const label = variant === 'home' ? 'TITULAR' : 'RESERVA';
      return shirtSvg(p, s, label);
    }

    function makeName(seed) {
      return `${choice(FIRST, seed)} ${choice(LAST, seed + 13)}`;
    }

    function makeClub(seed) {
      return choice(CLUBS, seed + 23);
    }

    function makeOverall(seed, pos) {
      const base = pos === 'GK' ? 74 : pos === 'DEF' ? 73 : pos === 'MID' ? 76 : 77;
      return clamp(Math.round(base + seededRandom(seed) * 18), 66, 95);
    }

    function generateRoster(team) {
      const roster = [];
      for (let i = 0; i < 23; i++) {
        const pos = POSITIONS[i];
        const seed = hash(team.code + ':' + i + ':' + team.seed);
        roster.push({
          id: `${team.code}-${i}`,
          name: makeName(seed),
          position: pos,
          overall: makeOverall(seed, pos),
          number: i + 1,
          club: makeClub(seed),
          shirt: i + 1,
          starter: i < 11,
          photo: playerAvatar(seed, makeName(seed)),
          country: team.name,
          flag: flagUrl(team.flag)
        });
      }
      return roster;
    }

    function defaultTeamState(team) {
      return {
        formation: '4-3-3',
        roster: generateRoster(team)
      };
    }

    function loadTeamState(team) {
      const saved = localStorage.getItem(`wc26-team-${team.code}`);
      if (!saved) return defaultTeamState(team);
      try {
        const parsed = JSON.parse(saved);
        const fallback = defaultTeamState(team);
        if (!parsed || !Array.isArray(parsed.roster)) return fallback;
        const map = new Map(fallback.roster.map(p => [p.id, p]));
        const merged = parsed.roster.map(p => ({ ...map.get(p.id), ...p }));
        return { formation: parsed.formation || '4-3-3', roster: merged };
      } catch {
        return defaultTeamState(team);
      }
    }

    function saveTeamState(team, data) {
      localStorage.setItem(`wc26-team-${team.code}`, JSON.stringify(data));
    }

    function teamStats(teamState) {
      const roster = teamState.roster;
      return {
        avg: Math.round(roster.reduce((a, p) => a + Number(p.overall), 0) / roster.length),
        gk: roster.filter(p => p.position === 'GK').length,
        def: roster.filter(p => p.position === 'DEF').length,
        mid: roster.filter(p => p.position === 'MID').length,
        att: roster.filter(p => p.position === 'ATT').length,
      };
    }

    function formationSlots(formation) {
      return FORMATIONS[formation] || FORMATIONS['4-3-3'];
    }

    function pickStarters(roster, formation) {
      const formationNeed = formationSlots(formation);
      const order = ['GK','DEF','MID','ATT'];
      const picked = [];
      const used = new Set();

      order.forEach((pos, idx) => {
        const slotCount = formationNeed.filter(v => v === pos).length;
        const candidates = roster.filter(p => p.position === pos).sort((a, b) => b.overall - a.overall);
        for (let i = 0; i < slotCount; i++) {
          const p = candidates[i];
          if (p && !used.has(p.id)) {
            picked.push(p);
            used.add(p.id);
          }
        }
      });

      // fill gaps with best remaining players
      roster.sort((a, b) => b.overall - a.overall).forEach(p => {
        if (picked.length < 11 && !used.has(p.id)) {
          picked.push(p);
          used.add(p.id);
        }
      });

      return picked.slice(0, 11).sort((a, b) => b.overall - a.overall);
    }

    function layoutForFormation(formation, starters) {
      const coords = FORMATION_LAYOUTS[formation] || FORMATION_LAYOUTS['4-3-3'];
      const arr = starters.slice(0, 11);
      while (arr.length < 11) arr.push(starters[0]);
      return arr.map((p, i) => ({ player: p, ...coords[i] }));
    }

      }));
      return groups;
    }

      const groups = groupTeams();

          date.setDate(base.getDate() + day);
          const hour = 15 + ((gi + idx) % 4) * 3;
          date.setHours(hour, 0, 0, 0);
          fixtures.push({
            stage: `Grupo ${g.label}`,
            home: pair[0].name,
            away: pair[1].name,
            date,
            stadium: HOST_CITIES[(gi * 6 + idx) % HOST_CITIES.length],
            note: `Rodada ${idx + 1}`
          });
          day += 1;
        });
      });
      return fixtures.slice(0, 104);

          <div class="flex items-center justify-between mb-3">
            <div>
              <p class="text-xs uppercase tracking-[0.3em] text-emerald-300">Grupo ${g.label}</p>
              <h3 class="text-xl font-black">${g.teams[0].confed} mix</h3>
            </div>
            <span class="rounded-full bg-white/5 px-3 py-1 text-xs text-slate-300">4 seleções</span>
          </div>
          <div class="space-y-2">
            ${g.teams.map(t => `
              <button class="w-full flex items-center gap-3 rounded-2xl border border-white/8 bg-white/5 px-3 py-2 text-left hover:bg-white/10 transition" onclick="window.__openTeam('${t.code}')">
                <img src="${flagUrl(t.flag)}" class="h-9 w-9 rounded-xl object-cover border border-white/10" alt="${t.name}">
                <div class="min-w-0">
                  <p class="truncate font-semibold">${t.name}</p>
                  <p class="text-xs text-slate-400">${t.confed}</p>
                </div>
              </button>`).join('')}
          </div>
        </div>
      `).join('');
    }

    function renderFixtures() {
      const wrap = document.getElementById('fixturesGrid');
      const filtered = state.matchFilter === 'Todos' ? FIXTURES : FIXTURES.filter(f => f.stage === state.matchFilter);
      wrap.innerHTML = filtered.slice(0, 30).map((f, idx) => `
        <div class="fixture-card glass rounded-[24px] p-4 border border-white/10">
          <div class="flex items-center justify-between gap-3">
            <span class="text-xs uppercase tracking-[0.28em] text-gold">${f.stage}</span>
            <span class="text-xs text-slate-400">Jogo ${idx + 1}</span>
          </div>
          <div class="mt-4 flex items-center justify-between gap-3">
            <div class="min-w-0 flex-1">
              <p class="truncate text-lg font-black">${f.home}</p>
              <p class="truncate text-sm text-slate-400">vs ${f.away}</p>
            </div>
            <div class="text-right shrink-0">
              <p class="font-semibold">${f.date.toLocaleDateString('pt-BR', { day:'2-digit', month:'short' })}</p>
              <p class="text-sm text-slate-400">${f.date.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' })}</p>
            </div>
          </div>
          <div class="mt-4 rounded-2xl bg-white/5 border border-white/8 p-3 text-sm text-slate-300">
            <div class="flex items-center justify-between gap-3">
              <span>${f.stadium.city}</span>
              <span>${f.stadium.country}</span>
            </div>
            <div class="mt-1 flex items-center justify-between gap-3 text-xs text-slate-400">
              <span>${f.stadium.cap} lugares</span>
              <span>${f.note}</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    function renderStadiums() {
      const grid = document.getElementById('stadiumGrid');
      grid.innerHTML = HOST_CITIES.map(city => `
        <div class="stadium-card glass rounded-[24px] overflow-hidden border border-white/10">
          <img src="${city.img}" alt="Estádio em ${city.city}" class="h-44 w-full object-cover" />
          <div class="p-4">
            <p class="text-xs uppercase tracking-[0.28em] text-emerald-300">${city.country}</p>
            <h3 class="mt-1 text-xl font-black">${city.city}</h3>
            <p class="mt-2 text-sm text-slate-300">Capacidade aproximada: ${city.cap} torcedores.</p>
          </div>
        </div>
      `).join('');
    }

    function renderRosterPanel(team, teamState) {
      const title = document.getElementById('lineupTitle');
      const pitch = document.getElementById('pitchView');
      const summary = document.getElementById('rosterSummary');
      const list = document.getElementById('rosterList');
      const formationSelect = document.getElementById('formationSelect');
      const stats = teamStats(teamState);
      const starters = pickStarters(teamState.roster.filter(p => p.starter), teamState.formation);
      const starterLayout = layoutForFormation(teamState.formation, starters);

      title.textContent = team.name;
      formationSelect.value = teamState.formation;

      summary.innerHTML = `
        <div class="rounded-2xl bg-white/5 border border-white/8 p-3"><p class="text-xs text-slate-400">OVR</p><p class="text-xl font-black">${stats.avg}</p></div>
        <div class="rounded-2xl bg-white/5 border border-white/8 p-3"><p class="text-xs text-slate-400">Titulares</p><p class="text-xl font-black">11</p></div>
        <div class="rounded-2xl bg-white/5 border border-white/8 p-3"><p class="text-xs text-slate-400">Banco</p><p class="text-xl font-black">12</p></div>
        <div class="rounded-2xl bg-white/5 border border-white/8 p-3"><p class="text-xs text-slate-400">Formação</p><p class="text-xl font-black">${teamState.formation}</p></div>
      `;

      pitch.innerHTML = `
        <div class="absolute inset-0 rounded-[28px] overflow-hidden"></div>
        <div class="pitch-center-circle"></div>
        <div class="pitch-spot"></div>
        ${starterLayout.map((slot, i) => `
          <div class="absolute" style="left:${slot.x}%; top:${slot.y}%; transform:translate(-50%,-50%);">
            <div class="w-16 sm:w-18 md:w-20 rounded-2xl bg-slate-950/80 border border-white/10 shadow-glow overflow-hidden">
              <img src="${slot.player.photo}" alt="${slot.player.name}" class="h-16 sm:h-18 w-full object-cover" onerror="this.src='${playerAvatar(hash(slot.player.name), slot.player.name)}'" />
              <div class="p-2 text-center">
                <div class="text-[10px] font-black text-gold">${slot.player.overall}</div>
                <div class="text-[9px] font-bold text-slate-200">${slot.player.position}</div>
                <div class="truncate text-[9px] text-slate-400">${slot.player.name.split(' ')[0]}</div>
              </div>
            </div>
          </div>
        `).join('')}
        <div class="absolute left-4 top-4 rounded-2xl bg-black/30 backdrop-blur px-3 py-2 text-xs text-slate-200 border border-white/10">${team.name} • ${teamState.formation}</div>
      `;

      list.innerHTML = teamState.roster
        .filter(p => state.positionFilter === 'ALL' ? true : p.position === state.positionFilter)
        .sort((a, b) => Number(b.starter) - Number(a.starter) || b.overall - a.overall)
        .map((player, idx) => `
          <article class="player-card rounded-[22px] border border-white/10 bg-white/5 overflow-hidden">
            <div class="grid grid-cols-[96px_1fr] gap-3 p-3">
              <div class="relative">
                <img src="${player.photo}" alt="${player.name}" class="h-24 w-24 rounded-2xl object-cover border border-white/10" onerror="this.src='${playerAvatar(hash(player.name), player.name)}'" />
                <span class="absolute -top-2 -right-2 rounded-full bg-gold px-2.5 py-1 text-[11px] font-black text-slate-950">${player.overall}</span>
              </div>
              <div class="min-w-0">
                <div class="flex items-start justify-between gap-2">
                  <div class="min-w-0">
                    ${state.editMode ? `
                      <input data-field="name" data-id="${player.id}" value="${escapeHtml(player.name)}" class="input-soft w-full rounded-xl px-2 py-1 text-sm font-semibold text-white mb-2" />
                    ` : `<h4 class="truncate text-lg font-black">${player.name}</h4>`}
                    <p class="text-xs text-slate-400">${player.club}</p>
                  </div>
                  <span class="rounded-full border border-white/10 bg-slate-950/50 px-2 py-1 text-[11px] font-bold">${player.starter ? 'Titular' : 'Banco'}</span>
                </div>
                <div class="mt-2 flex items-center gap-2 flex-wrap">
                  <img src="${flagUrl(player.flag.split('/').pop().replace('.png',''))}" alt="bandeira" class="h-5 w-5 rounded-full object-cover border border-white/10" onerror="this.style.display='none'" />
                  <span class="rounded-full bg-white/6 px-2 py-1 text-[11px] text-slate-200">${player.position}</span>
                  <span class="rounded-full bg-white/6 px-2 py-1 text-[11px] text-slate-200">#${player.number}</span>
                </div>
              </div>
            </div>
            <div class="px-3 pb-3 grid grid-cols-2 gap-2">
              <label class="text-[11px] text-slate-400">
                Overall
                ${state.editMode ? `<input data-field="overall" data-id="${player.id}" type="number" min="40" max="99" value="${player.overall}" class="input-soft mt-1 w-full rounded-xl px-2 py-1 text-sm text-white" />` : `<div class="mt-1 rounded-xl bg-white/5 border border-white/8 px-2 py-1 text-sm text-white">${player.overall}</div>`}
              </label>
              <label class="text-[11px] text-slate-400">
                Posição
                ${state.editMode ? `<select data-field="position" data-id="${player.id}" class="input-soft mt-1 w-full rounded-xl px-2 py-1 text-sm text-white">${['GK','DEF','MID','ATT'].map(p => `<option ${p===player.position?'selected':''}>${p}</option>`).join('')}</select>` : `<div class="mt-1 rounded-xl bg-white/5 border border-white/8 px-2 py-1 text-sm text-white">${player.position}</div>`}
              </label>
              <label class="text-[11px] text-slate-400">
                Camisa
                ${state.editMode ? `<input data-field="number" data-id="${player.id}" type="number" min="1" max="99" value="${player.number}" class="input-soft mt-1 w-full rounded-xl px-2 py-1 text-sm text-white" />` : `<div class="mt-1 rounded-xl bg-white/5 border border-white/8 px-2 py-1 text-sm text-white">${player.number}</div>`}
              </label>
              <label class="text-[11px] text-slate-400">
                Foto
                ${state.editMode ? `<input data-field="photo" data-id="${player.id}" value="${escapeHtml(player.photo)}" class="input-soft mt-1 w-full rounded-xl px-2 py-1 text-xs text-white" />` : `<div class="mt-1 rounded-xl bg-white/5 border border-white/8 px-2 py-1 text-xs text-white truncate">${player.photo.includes('picsum') ? 'Foto automática' : 'URL personalizada'}</div>`}
              </label>
            </div>
            ${state.editMode ? `
              <div class="px-3 pb-3 flex gap-2">
                <button class="grow rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-sm hover:bg-white/10 transition" data-swap="${player.id}">${player.starter ? 'Mover para o banco' : 'Mover para titulares'}</button>
              </div>
            ` : ''}
          </article>
        `).join('');

      bindRosterEdits(team);
    }

    function bindRosterEdits(team) {
      const teamState = loadTeamState(team);
      document.querySelectorAll('[data-field]').forEach(el => {
        el.addEventListener('input', () => {
          const id = el.dataset.id;
          const field = el.dataset.field;
          const player = teamState.roster.find(p => p.id === id);
          if (!player) return;
          if (field === 'overall' || field === 'number') player[field] = Number(el.value || player[field]);
          else player[field] = el.value;
          saveTeamState(team, teamState);
          renderRosterPanel(team, teamState);
        });
      });
      document.querySelectorAll('[data-swap]').forEach(btn => {
        btn.addEventListener('click', () => {
          const player = teamState.roster.find(p => p.id === btn.dataset.swap);
          if (!player) return;
          player.starter = !player.starter;
          saveTeamState(team, teamState);
          renderRosterPanel(team, teamState);
        });
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function openTeam(team) {
      const teamState = loadTeamState(team);
      state.activeTeam = team;
      state.formation = teamState.formation;
      state.editMode = false;
      state.positionFilter = 'ALL';
      modalRoot.classList.remove('hidden');
      document.body.classList.add('overflow-hidden');
      renderModal(team, teamState);
      renderRosterPanel(team, teamState);
    }

    function renderModal(team, teamState) {
      const coachName = `${choice(FIRST, team.seed + 100)} ${choice(LAST, team.seed + 200)}`;
      const stats = teamStats(teamState);
      modalContent.innerHTML = `
        <div class="border-b border-white/10 bg-slate-950/70 px-4 sm:px-6 py-4 flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
          <div class="flex items-center gap-4 min-w-0">
            <img src="${flagUrl(team.flag)}" alt="${team.name}" class="h-16 w-16 rounded-2xl object-cover border border-white/10" />
            <div class="min-w-0">
              <p class="text-xs uppercase tracking-[0.32em] text-emerald-300">${team.confed}</p>
              <h2 class="truncate text-3xl font-black">${team.name}</h2>
              <p class="text-sm text-slate-400">${coachName} • Técnico • OVR médio ${stats.avg}</p>
            </div>
          </div>
          <div class="flex flex-wrap items-center gap-2">
            <button id="toggleEdit" class="rounded-2xl bg-gold px-4 py-2 font-semibold text-slate-950">Editar time</button>
            <button id="btnSaveTeam" class="rounded-2xl border border-emerald-400/25 bg-emerald-400/10 px-4 py-2 font-semibold text-emerald-200">Salvar escalação</button>
            <button id="btnResetTeam" class="rounded-2xl border border-white/10 bg-white/5 px-4 py-2 font-semibold text-white">Resetar time</button>
            <button id="btnCloseModal" class="rounded-2xl border border-white/10 bg-white/5 px-4 py-2 font-semibold text-white">Fechar</button>
          </div>
        </div>
        <div class="grid lg:grid-cols-[1fr_.95fr] gap-0">
          <div class="border-r border-white/10">
            <div class="grid sm:grid-cols-3 gap-3 p-4 sm:p-5 border-b border-white/10">
              <img src="${kitImage(team.seed, 'home')}" alt="Camisa titular" class="rounded-2xl w-full h-40 object-cover border border-white/10" />
              <img src="${kitImage(team.seed, 'away')}" alt="Camisa reserva" class="rounded-2xl w-full h-40 object-cover border border-white/10" />
              <div class="glass rounded-2xl p-4 border border-white/10">
                <p class="text-sm text-slate-400">Resumo</p>
                <div class="mt-3 space-y-2 text-sm">
                  <div class="flex justify-between"><span>Titulares</span><strong>11</strong></div>
                  <div class="flex justify-between"><span>Reservas</span><strong>12</strong></div>
                  <div class="flex justify-between"><span>Goleiros</span><strong>${stats.gk}</strong></div>
                  <div class="flex justify-between"><span>Defensores</span><strong>${stats.def}</strong></div>
                  <div class="flex justify-between"><span>Meias</span><strong>${stats.mid}</strong></div>
                  <div class="flex justify-between"><span>Atacantes</span><strong>${stats.att}</strong></div>
                </div>
              </div>
            </div>
            <div class="p-4 sm:p-5">
              <div class="flex items-center justify-between gap-3 mb-4">
                <div>
                  <p class="text-xs uppercase tracking-[0.28em] text-gold">Formação</p>
                  <h3 class="text-2xl font-black">${teamState.formation}</h3>
                </div>
                <p class="text-sm text-slate-400">Posicione o elenco como quiser</p>
              </div>
              <div class="rounded-[28px] border border-white/10 bg-slate-950/40 p-4">
                <div class="grid sm:grid-cols-2 gap-3">
                  <div class="rounded-2xl bg-white/5 border border-white/8 p-4">
                    <p class="text-xs text-slate-400">Técnico</p>
                    <div class="mt-3 flex items-center gap-3">
                      <img src="${coachAvatar(team.seed, coachName)}" class="h-14 w-14 rounded-2xl object-cover border border-white/10" alt="Técnico" />
                      <div>
                        <p class="font-semibold">${coachName}</p>
                        <p class="text-sm text-slate-400">Estratégia e ajustes táticos</p>
                      </div>
                    </div>
                  </div>
                  <div class="rounded-2xl bg-white/5 border border-white/8 p-4">
                    <p class="text-xs text-slate-400">Dica</p>
                    <p class="mt-2 text-sm text-slate-300">Use o botão <strong>Editar time</strong> para alterar nomes, fotos, números, posições e mover atletas entre titular e banco.</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="p-4 sm:p-5 bg-slate-950/35">
            <div class="flex flex-wrap gap-2 mb-4">
              <span class="rounded-full bg-white/5 px-3 py-1 text-xs text-slate-300">Clique em editar</span>
              <span class="rounded-full bg-white/5 px-3 py-1 text-xs text-slate-300">Salvar no localStorage</span>
              <span class="rounded-full bg-white/5 px-3 py-1 text-xs text-slate-300">Formação tática</span>
            </div>
            <div id="modalPlayers"></div>
          </div>
        </div>
      `;

      document.getElementById('btnCloseModal').onclick = closeModal;
      document.getElementById('btnSaveTeam').onclick = () => {
        teamState.formation = document.getElementById('formationSelect').value;
        saveTeamState(team, teamState);
        showToast('Escalação salva com sucesso.');
      };
      document.getElementById('btnResetTeam').onclick = () => {
        localStorage.removeItem(`wc26-team-${team.code}`);
        const fresh = defaultTeamState(team);
        state.formation = fresh.formation;
        renderModal(team, fresh);
        renderRosterPanel(team, fresh);
        showToast('Time resetado para o padrão.');
      };
      document.getElementById('toggleEdit').onclick = () => {
        state.editMode = !state.editMode;
        renderRosterPanel(team, loadTeamState(team));
        document.getElementById('toggleEdit').textContent = state.editMode ? 'Modo edição ativo' : 'Editar time';
      };
      document.getElementById('formationSelect').onchange = (e) => {
        teamState.formation = e.target.value;
        saveTeamState(team, teamState);
        renderRosterPanel(team, teamState);
      };
      document.querySelectorAll('.pos-btn').forEach(btn => {
        btn.classList.toggle('bg-gold', btn.dataset.posbtn === 'ALL');
        btn.classList.toggle('text-slate-950', btn.dataset.posbtn === 'ALL');
        btn.addEventListener('click', () => {
          state.positionFilter = btn.dataset.posbtn;
          document.querySelectorAll('.pos-btn').forEach(b => {
            const active = b.dataset.posbtn === state.positionFilter;
            b.classList.toggle('bg-gold', active);
            b.classList.toggle('text-slate-950', active);
          });
          renderRosterPanel(team, loadTeamState(team));
        });
      });
    }

    function closeModal() {
      modalRoot.classList.add('hidden');
      document.body.classList.remove('overflow-hidden');
      state.activeTeam = null;
    }

    function showToast(msg) {
      let toast = document.getElementById('toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast';
        toast.className = 'fixed bottom-6 left-1/2 z-[60] -translate-x-1/2 rounded-2xl border border-white/10 bg-slate-950/90 px-4 py-3 text-sm text-white shadow-glow';
        document.body.appendChild(toast);
      }
      toast.textContent = msg;
      toast.style.opacity = '1';
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => toast.style.opacity = '0', 1800);
    }

    function attachEvents() {
      document.getElementById('teamSearch').addEventListener('input', (e) => {
        state.search = e.target.value;
        renderTeams();
        if (state.activeTeam) {
          const team = state.activeTeam;
          renderRosterPanel(team, loadTeamState(team));
        }
      });
      document.getElementById('confedFilter').addEventListener('change', (e) => {
        state.filterConfed = e.target.value;
        renderTeams();
      });
      document.getElementById('btnShuffle').addEventListener('click', () => {
        TEAMS.sort(() => Math.random() - 0.5);
        renderTeams();
        renderGroups();
        showToast('Destaques reorganizados.');
      });
      document.getElementById('btnResetAll').addEventListener('click', () => {
        TEAMS.forEach(team => localStorage.removeItem(`wc26-team-${team.code}`));
        renderApp();
        showToast('Todas as escalações foram redefinidas.');
      });
      document.getElementById('btnRandomTeam').addEventListener('click', () => {
        const team = choice(filteredTeams(), Date.now()) || choice(TEAMS, Date.now());
        openTeam(team);
      });
      document.getElementById('btnScrollTop').addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
      document.getElementById('btnAutoBest').addEventListener('click', () => {
        if (!state.activeTeam) return;
        const team = state.activeTeam;
        const teamState = loadTeamState(team);
        const formation = teamState.formation;
        const needed = formationSlots(formation);
        const byPos = {
          GK: teamState.roster.filter(p => p.position === 'GK').sort((a,b)=>b.overall-a.overall)[0],
          DEF: teamState.roster.filter(p => p.position === 'DEF').sort((a,b)=>b.overall-a.overall),
          MID: teamState.roster.filter(p => p.position === 'MID').sort((a,b)=>b.overall-a.overall),
          ATT: teamState.roster.filter(p => p.position === 'ATT').sort((a,b)=>b.overall-a.overall)
        };
        const starters = [];
        starters.push(byPos.GK);
        needed.filter(v => v === 'DEF').forEach((_,i) => starters.push(byPos.DEF[i]));
        needed.filter(v => v === 'MID').forEach((_,i) => starters.push(byPos.MID[i]));
        needed.filter(v => v === 'ATT').forEach((_,i) => starters.push(byPos.ATT[i]));
        teamState.roster.forEach(p => p.starter = starters.some(s => s && s.id === p.id));
        saveTeamState(team, teamState);
        renderRosterPanel(team, teamState);
        showToast('Titulares ajustados para os melhores jogadores.');
      });
      document.getElementById('matchFilter').addEventListener('change', (e) => {
        state.matchFilter = e.target.value;
        renderFixtures();
      });
      modalBackdrop.addEventListener('click', closeModal);
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeModal();
      });
      window.__openTeam = (code) => {
        const team = TEAMS.find(t => t.code === code);
        if (team) openTeam(team);
      };
    }

    renderApp();
  </script>
</body>
</html>
